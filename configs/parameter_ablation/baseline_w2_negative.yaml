# 基准实验 — 窗口 W2：负价期（2025-03）
# 3月负价率 13.2%（全年最高），考验模型对负价区间的捕捉能力。
# 注意：数据从 2025-01-01 起，树模型训练窗口(1440h)在月初几个起报点可能不满60天，
#       回测引擎会自动跳过历史不足的起报点，不影响公平性。
# 用法：python src/parameter_ablation/run_experiment.py configs/parameter_ablation/baseline_w2_negative.yaml

name: baseline_w2_negative
market: ERCOT
nodes_group: volatility
freq: 1h
context_len: 168
train_context_len: 1440
horizon: 24
data_start: 2025-01-01
data_end: 2025-04-01

backtest:
  test_start: 2025-03-01
  test_end: 2025-03-31
  stride_hours: 24
  max_origins: 30

models: [Naive, SeasonalNaive, ETS, Theta, RandomForest, LightGBM, XGBoost, TimesFM, Chronos2, Toto, Toto2]

covariates: []

spike:
  quantile: 0.95
  mode: global
