# 消融 F：数据频率 — 窗口 W3：极端尖峰期（2026-01）
# 联动策略同 W1：等时间跨度比较
#   1h  → context_len=168 / horizon=24 / stride=24  / train=1440
#   15min→ context_len=672 / horizon=96 / stride=96  / train=5760
#
# 用法：python src/parameter_ablation/run_ablation.py configs/parameter_ablation/ablation_F_frequency_w3_extreme.yaml

name: ablation_F_frequency_w3_extreme
market: ERCOT
nodes_group: volatility
freq: 1h
context_len: 168
train_context_len: 1440
horizon: 24
data_start: 2025-09-01
data_end: 2026-02-01

backtest:
  test_start: 2026-01-01
  test_end: 2026-01-31
  stride_hours: 24
  max_origins: 30

models: [Naive, SeasonalNaive, ETS, Theta, RandomForest, LightGBM, XGBoost, TimesFM, Chronos2, Toto, Toto2]

covariates: []

spike:
  quantile: 0.95
  mode: global

ablate:
  key: freq
  values: [1h, 15min]
  labels: ["1h（基准）", "15min（联动等时长）"]
  axis_label: "数据频率"
  linked:
    - {context_len: 168, horizon: 24, backtest.stride_hours: 24, train_context_len: 1440}
    - {context_len: 672, horizon: 96, backtest.stride_hours: 96, train_context_len: 5760}
