# 消融 F：数据频率（手册 §6）— 窗口 W1：夏季稳定期（2025-08）
# 只转动 freq 一个旋钮：1h → 15min
# 联动调整 context_len / horizon / backtest.stride_hours / train_context_len，
# 使两个频率档的预测任务在"时间跨度"上等价：
#   1h  → context_len=168 (7天) / horizon=24 (24h) / stride=24  (每天) / train=1440 (60天)
#   15min→ context_len=672 (7天) / horizon=96 (24h) / stride=96  (每天) / train=5760 (60天)
# 回答：更高频数据是否真的使预测变难？（等时间跨度对比）
#
# 用法：python src/parameter_ablation/run_ablation.py configs/parameter_ablation/ablation_F_frequency.yaml

name: ablation_F_frequency_w1_stable
market: ERCOT
nodes_group: volatility
freq: 1h                     # 会被 ablate 覆盖
context_len: 168             # 会被 linked 覆盖
train_context_len: 1440      # 会被 linked 覆盖
horizon: 24                  # 会被 linked 覆盖
data_start: 2025-04-01
data_end: 2025-09-01

backtest:
  test_start: 2025-08-01
  test_end: 2025-08-31
  stride_hours: 24           # 会被 linked 覆盖
  max_origins: 30

models: [Naive, SeasonalNaive, ETS, Theta, RandomForest, LightGBM, XGBoost, TimesFM, Chronos2, Toto, Toto2]

covariates: []

spike:
  quantile: 0.95
  mode: global

# ── 被消融的旋钮 ──────────────────────────────────────────────────────────────
ablate:
  key: freq
  values: [1h, 15min]
  labels: ["1h（基准）", "15min（联动等时长）"]
  axis_label: "数据频率"
  # 联动旋钮：每档与 freq 同步调整，保证时间跨度一致
  linked:
    - {context_len: 168, horizon: 24, backtest.stride_hours: 24, train_context_len: 1440}
    - {context_len: 672, horizon: 96, backtest.stride_hours: 96, train_context_len: 5760}
