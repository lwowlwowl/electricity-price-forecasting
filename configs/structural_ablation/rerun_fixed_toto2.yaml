# 重跑修复后的 Toto-2.0 结构消融（只跑之前 CRASH 的项目）
# - halve_heads: 原先 CRASH（GQA Q/KV 不对称），现已修复为同时减半
# - simplify_output_head: 暂不支持（output_head 结构复杂），跳过
# - skip_layernorm: 原先 CRASH，现在改用递归替换
name: structural_fixed_toto2
market: ERCOT
nodes_group: volatility
freq: 1h
context_len: 168
horizon: 24
data_start: "2025-06-01"
data_end: "2025-09-01"
backtest:
  test_start: "2025-08-01"
  test_end: "2025-08-31"
  stride_hours: 24
  max_origins: 30
spike:
  quantile: 0.95
  mode: global
multivariate: false
structural_ablation:
  models: [toto2]
  ablations:
    - halve_heads
    - skip_layernorm
  include_baseline: true
  baseline_models: [Naive, SeasonalNaive, ETS]
