# 重跑修复后的 Chronos-2 结构消融（之前 CRASH 的项目）
# - simplify_patch_emb: 原先 CRASH（ResidualBlock 没有 in_features），现用 residual_layer.weight
# - simplify_output_head: 原先 CRASH，现用 residual_layer.weight
name: structural_fixed_chronos2
market: ERCOT
nodes_group: volatility
freq: 1h
context_len: 168
horizon: 24
data_start: "2025-06-01"
data_end: "2025-09-01"
backtest:
  test_start: "2025-08-01"
  test_end: "2025-08-31"
  stride_hours: 24
  max_origins: 30
spike:
  quantile: 0.95
  mode: global
multivariate: true
structural_ablation:
  models: [chronos2]
  ablations:
    - simplify_patch_emb
    - simplify_output_head
  include_baseline: true
  baseline_models: [Naive, SeasonalNaive, ETS]
