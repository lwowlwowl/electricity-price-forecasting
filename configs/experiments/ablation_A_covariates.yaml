# 消融 A：协变量（手册 §6）
# 只转动 covariates 一个旋钮：无 → +负荷 → +负荷+温度 → +负荷+温度+风光
# 其余全部锁死在基准配置，回答"协变量对各模型的提升幅度？谁最吃协变量？"
#
# 注意：只有 supports_covariates=True 的模型（Chronos2）才真正喂协变量，
#       其余模型自动降级为单变量，并在结果中标记 covariates_used=False（能力诚实原则）。
#       消融 A 的核心结论之一就是"能用协变量的模型有多大优势"。
#
# 用法：python src/forecasting/run_ablation.py configs/experiments/ablation_A_covariates.yaml

name: ablation_A_covariates_w1_stable
market: ERCOT
nodes_group: volatility
freq: 1h
context_len: 168             # 7 天回看，与基准一致
train_context_len: 1440      # 树模型训练窗口固定
horizon: 24
data_start: 2025-04-01
data_end: 2025-09-01

backtest:
  test_start: 2025-08-01
  test_end: 2025-08-31
  stride_hours: 24
  max_origins: 30

models: [Naive, SeasonalNaive, ETS, Theta, RandomForest, LightGBM, XGBoost, TimesFM, Chronos2, Toto, Toto2]

covariates: []               # 会被 ablate 覆盖

spike:
  quantile: 0.95
  mode: global

# ── 被消融的旋钮 ──────────────────────────────────────────────────────────────
ablate:
  key: covariates
  values:
    - []
    - [load]
    - [load, temperature]
    - [load, temperature, wind, solar]
  labels: ["无协变量", "+负荷", "+负荷+温度", "+负荷+温度+风光"]
  axis_label: "协变量组合"
