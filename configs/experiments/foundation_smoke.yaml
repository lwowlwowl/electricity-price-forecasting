# 基础模型接入验证配置（阶段：接入基础模型）
# 用法：python src/forecasting/run_experiment.py configs/experiments/foundation_smoke.yaml
#
# 目的：用 ERCOT 真实数据把 TimesFM / Chronos2 / Toto 三个基础模型与基线
# 放进同一套滚动回测里跑通，确认子进程 worker 批量调度链路正确、指标可算。
# 起报点先压到 8 个（验证用），跑通后去掉 max_origins 即可上全测试期。

name: foundation_smoke
market: ERCOT
nodes_group: volatility      # 引用 configs/nodes.yaml 里的节点组（3 节点）
freq: 1h
context_len: 168             # 回看 7 天
horizon: 24                  # 预测未来 24 小时（日前预测）
data_start: 2025-06-01
data_end: 2025-09-01

backtest:
  test_start: 2025-08-01
  test_end: 2025-08-31
  stride_hours: 24           # 每天一个起报点
  max_origins: 8             # 验证用，先少跑几个起报点

# 基线 + 三个基础模型同台对比
models: [SeasonalNaive, TimesFM, Chronos2, Toto]

covariates: []               # 本期基础模型按零样本/单变量验证，先不喂协变量

spike:
  quantile: 0.95
  mode: global
