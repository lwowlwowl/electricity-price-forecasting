# 消融 F：数据频率 — 窗口 W2：负价期（2025-03）
# 用法：python src/forecasting/run_ablation.py configs/experiments/ablation_F_frequency_w2_negative.yaml

name: ablation_F_frequency_w2_negative
market: ERCOT
nodes_group: volatility
freq: 1h
context_len: 168
train_context_len: 1440
horizon: 24
data_start: 2025-01-01
data_end: 2025-04-01

backtest:
  test_start: 2025-03-01
  test_end: 2025-03-31
  stride_hours: 24
  max_origins: 30

models: [Naive, SeasonalNaive, ETS, Theta, RandomForest, LightGBM, XGBoost, TimesFM, Chronos2, Toto]

covariates: []

spike:
  quantile: 0.95
  mode: global

ablate:
  key: freq
  values: [1h, 15min]
  labels: ["1h", "15min"]
  axis_label: "数据频率"
