# 消融 D：预测步长 — 窗口 W1：稳定期（2025-08）
# 用法：python src/forecasting/run_ablation.py configs/experiments/ablation_D_horizon_w1_stable.yaml

name: ablation_D_horizon_w1_stable
market: ERCOT
nodes_group: volatility
freq: 1h
context_len: 168
train_context_len: 1440
horizon: 24
data_start: 2025-04-01
data_end: 2025-09-01

backtest:
  test_start: 2025-08-01
  test_end: 2025-08-31
  stride_hours: 24
  max_origins: 10

models: [Naive, SeasonalNaive, ETS, Theta, RandomForest, LightGBM, XGBoost, TimesFM, Chronos2, Toto]

covariates: []

spike:
  quantile: 0.95
  mode: global

ablate:
  key: horizon
  values: [24, 48, 168]
  labels: ["24h（日前）", "48h（两日前）", "168h（周前）"]
  axis_label: "预测步长"
