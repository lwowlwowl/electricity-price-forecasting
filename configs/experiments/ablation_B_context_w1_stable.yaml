# 消融 B：上下文长度 — 窗口 W1：稳定期（2025-08）
# 用法：python src/forecasting/run_ablation.py configs/experiments/ablation_B_context_w1_stable.yaml

name: ablation_B_context_w1_stable
market: ERCOT
nodes_group: volatility
freq: 1h
context_len: 168
train_context_len: 1440
horizon: 24
data_start: 2025-04-01
data_end: 2025-09-01

backtest:
  test_start: 2025-08-01
  test_end: 2025-08-31
  stride_hours: 24
  max_origins: 10

models: [Naive, SeasonalNaive, ETS, Theta, RandomForest, LightGBM, XGBoost, TimesFM, Chronos2, Toto]

covariates: []

spike:
  quantile: 0.95
  mode: global

ablate:
  key: context_len
  values: [168, 336, 720]
  labels: ["168h(7天)", "336h(14天)", "720h(30天)"]
  axis_label: "上下文长度"
