# 消融 F：数据频率 — 窗口 W3：极端尖峰期（2026-01）
# 用法：python src/forecasting/run_ablation.py configs/experiments/ablation_F_frequency_w3_extreme.yaml

name: ablation_F_frequency_w3_extreme
market: ERCOT
nodes_group: volatility
freq: 1h
context_len: 168
train_context_len: 1440
horizon: 24
data_start: 2025-09-01
data_end: 2026-02-01

backtest:
  test_start: 2026-01-01
  test_end: 2026-01-31
  stride_hours: 24
  max_origins: 30

models: [Naive, SeasonalNaive, ETS, Theta, RandomForest, LightGBM, XGBoost, TimesFM, Chronos2, Toto, Toto2]

covariates: []

spike:
  quantile: 0.95
  mode: global

ablate:
  key: freq
  values: [1h, 15min]
  labels: ["1h", "15min"]
  axis_label: "数据频率"
