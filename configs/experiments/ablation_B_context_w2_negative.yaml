# 消融 B：上下文长度 — 窗口 W2：负价期（2025-03）
# 注意：720h 上下文 + 1440h 训练窗口在 3月初可能超出可用历史（数据从 2025-01-01 起），
#       回测引擎会自动跳过历史不足的起报点。
# 用法：python src/forecasting/run_ablation.py configs/experiments/ablation_B_context_w2_negative.yaml

name: ablation_B_context_w2_negative
market: ERCOT
nodes_group: volatility
freq: 1h
context_len: 168
train_context_len: 1440
horizon: 24
data_start: 2025-01-01
data_end: 2025-04-01

backtest:
  test_start: 2025-03-01
  test_end: 2025-03-31
  stride_hours: 24
  max_origins: 30

models: [Naive, SeasonalNaive, ETS, Theta, RandomForest, LightGBM, XGBoost, TimesFM, Chronos2, Toto, Toto2]

covariates: []

spike:
  quantile: 0.95
  mode: global

ablate:
  key: context_len
  values: [168, 336, 720]
  labels: ["168h(7天)", "336h(14天)", "720h(30天)"]
  axis_label: "上下文长度"
