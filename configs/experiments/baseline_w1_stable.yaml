# 基准实验 — 窗口 W1：稳定期（2025-08）
# 这是原 baseline.yaml 的测试窗口。8月是最平稳的月份（std=23.4, 无负价, 无极端尖峰）。
# 用法：python src/forecasting/run_experiment.py configs/experiments/baseline_w1_stable.yaml

name: baseline_w1_stable
market: ERCOT
nodes_group: volatility
freq: 1h
context_len: 168
train_context_len: 1440
horizon: 24
data_start: 2025-04-01
data_end: 2025-09-01

backtest:
  test_start: 2025-08-01
  test_end: 2025-08-31
  stride_hours: 24
  max_origins: 30

models: [Naive, SeasonalNaive, ETS, Theta, RandomForest, LightGBM, XGBoost, TimesFM, Chronos2, Toto]

covariates: []

spike:
  quantile: 0.95
  mode: global
